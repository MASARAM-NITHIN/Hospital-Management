<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Patient Management</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<h2>👤 Patient Management</h2>

<form th:action="@{/patients/add}" method="post">
    <input type="text" name="patientName" placeholder="Patient Name" required>
    <input type="number" name="age" placeholder="Age" required>
    <input type="text" name="gender" placeholder="Gender" required>
    <input type="text" name="disease" placeholder="Disease" required>
    <button class="add-btn">Add Patient</button>
    
     <a th:href="@{/}" class="btn-back">Back</a>
</form>

<table>
<tr>
    <th>Name</th>
    <th>Age</th>
    <th>Gender</th>
    <th>Disease</th>
    <th>Action</th>
</tr>

<tr th:each="p : ${patients}">
    <td th:text="${p.patientName}"></td>
    <td th:text="${p.age}"></td>
    <td th:text="${p.gender}"></td>
    <td th:text="${p.disease}"></td>
    <td>
        <a th:href="@{/patients/delete(id=${p.patientId})}" class="delete-link">Delete</a>
    </td>
</tr>
</table>

</body>
</html>
