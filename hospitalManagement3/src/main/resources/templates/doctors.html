<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Doctor Management</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <h2>👨‍⚕️ Doctor Management</h2>
    
    <form th:action="@{/doctors/add}" method="post">
        <input type="text" name="doctorName" placeholder="Doctor Name" required>
        <input type="text" name="specialization" placeholder="Specialization" required>
        <button type="submit" class="add-btn">Add Doctor</button>
<a th:href="@{/}" class="btn-back">Back</a>    	
    </form>

   
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Specialization</th>
            <th>Action</th>
        </tr>

        <tr th:each="d : ${doctors}">
            <td th:text="${d.doctorId}"></td>
            <td th:text="${d.doctorName}"></td>
            <td th:text="${d.specialization}"></td>
            <td>
                <a th:href="@{/doctors/delete(id=${d.doctorId})}" 
                   class="delete-link"
                   onclick="return confirm('Are you sure you want to delete this doctor?');">
                   Delete
                </a>
            </td>
        </tr>
    </table>

</body>
</html>
